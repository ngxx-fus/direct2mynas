<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>NAS REDIRECT (CHUYỂN TIẾP ĐẾN NAS CỦA FUS)</title>
    <link rel="icon" type="image/x-icon" href="img.jpg">

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js";
        import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyANRc0UBr3t9rAz6LRjuatZKlGGk7dTG4Y",
            authDomain: "my-nas-ip.firebaseapp.com",
            databaseURL: "https://my-nas-ip-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "my-nas-ip",
            storageBucket: "my-nas-ip.firebasestorage.app",
            messagingSenderId: "306142893095",
            appId: "1:306142893095:web:ce7577eeb0ec2953162a02"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        async function loadData() {
            try {
                const snapshot = await get(ref(db));
                if (snapshot.exists()) {
                    const data = snapshot.val();
                    const infoText = document.getElementById("info-text");
                    infoText.innerHTML = "<h3>Firebase RTDB:</h3><pre style='display:inline-block; text-align:left; margin:0;'>" + JSON.stringify(data, null, 2) + "</pre>";

                    const buttons = document.getElementById("buttons");
                    buttons.innerHTML = ""; 

                    const services = [
                        { name: "File Browser", color: "#3259CD", url: `http://ngxxfusnas.servehttp.com:${data.FileBrowsePort}` },
                        { name: "OpenMediaVault", color: "#00809D", url: `http://ngxxfusnas.servehttp.com:${data.OMVPort}` },
                        { name: "Shared Folder", color: "#17313E", url: `http://ngxxfusnas.servehttp.com:${data.FileBrowsePort}/public/share/xmNftY4iX41PMaU8-e0NyQ` }
                    ];

                    services.forEach((service) => {
                        if (data.GlobalIp) {
                            const btn = createButton(service.name, service.color, service.url);
                            buttons.appendChild(btn);
                        }
                    });
                }
            } catch (err) {
                console.error(err);
            }
        }

        function createButton(text, color, link) {
            const btn = document.createElement("button");
            btn.innerHTML = `<span class="square"></span><span class="btn-text">${text}</span>`;
            btn.style.backgroundColor = color;
            btn.onclick = () => { window.location.href = link; };
            return btn;
        }

        loadData();
    </script>
    <style>
        body { 
            background-color: black; 
            color: white; 
            font-family: monospace; 
            margin: 0;
            padding: 20px 0;
            box-sizing: border-box;
            min-height: 100vh;
            /* Căn giữa toàn bộ khối 600px ra giữa màn hình */
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        /* Container chính chứa toàn bộ data và footer */
        #container-600 {
            width: 600px;
            min-width: 600px; /* Ép cứng 600px kể cả trên điện thoại */
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #data { 
            width: 100%;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }

        #main-card {
            display: flex;
            flex-direction: row;
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid white;
            border-radius: 10px;
            margin-bottom: 20px;
            align-items: stretch;
            overflow: hidden;
            background-color: #111;
        }

        #info-text { 
            flex: 1;
            padding: 20px; 
            text-align: center; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            overflow-x: auto;
        }

        #buttons { 
            width: 250px; 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
            justify-content: center;
            padding: 20px;
            border-left: 1px solid #444;
            background: rgba(0, 0, 0, 0.2);
        }

        button { 
            display: flex; 
            align-items: center; 
            justify-content: left; 
            padding: 12px 15px; 
            font-size: 13px; 
            color: white; 
            border: none; 
            border-radius: 5px; 
            cursor: pointer; 
            width: 100%;
            transition: 0.3s; 
        }

        .square { 
            width: 10px; 
            height: 10px; 
            background-color: white; 
            display: inline-block; 
            margin-right: 12px; 
            border-radius: 2px; 
            flex-shrink: 0; 
        }

        .btn-text { 
            font-weight: bold; 
            flex: 1;
            text-align: left;
        }

        button:hover { opacity: 0.85; transform: scale(1.02); }
        
        #preview-container {
            width: 100%; 
            border: 1px solid white;
            border-radius: 10px;
            overflow: hidden;
            background-color: #111;
        }

        .ideone-wrapper {
            background: white;
            padding: 10px;
            text-align: left;
            min-height: 400px;
        }
        
        footer { 
            margin-top: 30px; 
            font-size: 12px; 
            color: #aaa; 
            width: 100%;
            text-align: center;
            line-height: 1.6;
        }

        /* --- Xóa Media Query thay đổi width để giữ 600px trên mobile --- */
        @media (max-aspect-ratio: 1/1), (max-width: 850px) {
            /* Chỉ thay đổi bố cục bên trong Card, không đổi width container */
            #main-card { flex-direction: column !important; }
            #buttons { 
                width: 100% !important; 
                border-left: none !important;
                border-top: 1px solid #444;
                padding-top: 15px;
            }
            #info-text { padding-bottom: 15px; }
        }
    </style>
</head>

<body>
    <div id="container-600">
        <div id="data">
            <div id="main-card">
                <div id="info-text">Loading... (Đang tải...)</div>
                <div id="buttons"></div>
            </div>
            
            <div id="preview-container">
                <div style="background: #333; padding: 8px 12px; border-bottom: 1px solid #444; text-align: center; font-size: 12px; color: #ccc; font-family: monospace; display: flex; align-items: center; justify-content: center; gap: 8px;">
                    <span style="color: #27c93f;">●</span> Code Stuff (Ideone)
                </div>
                <div class="ideone-wrapper">
                    <script src="https://ideone.com/e.js/AIMZdC" type="text/javascript" ></script>
                </div>
            </div>
        </div>

        <footer>
            Nguyễn Thanh Phú - 0845939722 - msnp@outlook.com.vn
        </footer>
    </div>
</body>

</html>
