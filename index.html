<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>NAS REDIRECT (CHUYỂN TIẾP ĐẾN NAS CỦA FUS)</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js";
        import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyANRc0UBr3t9rAz6LRjuatZKlGGk7dTG4Y",
            authDomain: "my-nas-ip.firebaseapp.com",
            databaseURL: "https://my-nas-ip-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "my-nas-ip",
            storageBucket: "my-nas-ip.firebasestorage.app",
            messagingSenderId: "306142893095",
            appId: "1:306142893095:web:ce7577eeb0ec2953162a02"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        /// @brief Fetches NAS IP and Port info from Firebase and builds the UI.
        async function loadData() {
            try {
                const snapshot = await get(ref(db));
                if (snapshot.exists()) {
                    const data = snapshot.val();

                    const infoText = document.getElementById("info-text");
                    infoText.innerHTML = "<h3>Firebase RTDB:</h3><pre style='display:inline-block; text-align:left; margin:0;'>" + JSON.stringify(data, null, 2) + "</pre>";

                    const buttons = document.getElementById("buttons");
                    buttons.innerHTML = ""; 

                    const services = [
                        {
                            name: "File Browser",
                            color: "#3259CD",
                            url: `http://${data.GlobalIp}:${data.FileBrowsePort}`
                        },
                        {
                            name: "OpenMediaVault",
                            color: "#00809D",
                            url: `http://${data.GlobalIp}:${data.OMVPort}`
                        },
                        {
                            name: "Shared Folder",
                            color: "#17313E",
                            url: `http://${data.GlobalIp}:${data.FileBrowsePort}/public/share/xmNftY4iX41PMaU8-e0NyQ`
                        }
                    ];

                    services.forEach((service) => {
                        if (data.GlobalIp) {
                            const btn = createButton(service.name, service.color, service.url);
                            buttons.appendChild(btn);
                        }
                    });

                } else {
                    document.getElementById("info-text").innerText = "No record found!";
                }
            } catch (err) {
                console.error(err);
                document.getElementById("info-text").innerText = "Error while reading from Firebase!";
            }
        }

        /// @brief Creates a styled button that redirects immediately on click.
        function createButton(text, color, link) {
            const btn = document.createElement("button");
            btn.innerHTML = `<span class="square"></span><span class="btn-text">${text}</span>`;
            btn.style.backgroundColor = color;
            
            btn.onclick = () => {
                /* Redirect directly to the service URL */
                window.location.href = link;
            };
            return btn;
        }

        loadData();
    </script>
    <style>
        body { 
            background-color: black; 
            color: white; 
            font-family: monospace; 
            padding: 3% 12.5%; 
            text-align: center; 
            margin: 0;
            box-sizing: border-box;
            min-height: 100vh;
        }

        /* --- Responsive Layout for Vertical/Mobile --- */
        @media (max-aspect-ratio: 1/1), (max-width: 850px) {
            body { padding: 3%; }
            #main-card, #preview-container { 
                width: 100% !important; 
            }
            #main-card { flex-direction: column !important; }
            #buttons { 
                width: 100% !important; 
                border-left: none !important;
                border-top: 1px solid #444;
                padding-top: 15px;
            }
            #info-text { padding-bottom: 15px; }
        }

        #data { 
            padding: 20px; 
            margin: 0 auto; 
            width: 100%; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            box-sizing: border-box;
        }

        /* --- Main Box: Fixed 600px width on desktop --- */
        #main-card {
            display: flex;
            flex-direction: row;
            width: 600px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid white;
            border-radius: 10px;
            margin-bottom: 20px;
            align-items: stretch;
            overflow: hidden;
            background-color: #111;
        }

        #info-text { 
            flex: 1;
            padding: 20px; 
            text-align: center; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            overflow-x: auto;
        }

        #buttons { 
            width: 250px; 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
            justify-content: center;
            padding: 20px;
            border-left: 1px solid #444;
            background: rgba(0, 0, 0, 0.2);
        }

        button { 
            display: flex; 
            align-items: center; 
            justify-content: left; 
            padding: 12px 15px; 
            font-size: 13px; 
            color: white; 
            border: none; 
            border-radius: 5px; 
            cursor: pointer; 
            width: 100%;
            transition: 0.3s; 
        }

        .square { 
            width: 10px; 
            height: 10px; 
            background-color: white; 
            display: inline-block; 
            margin-right: 12px; 
            border-radius: 2px; 
            flex-shrink: 0; 
        }

        .btn-text { 
            font-weight: bold; 
            flex: 1;
            text-align: left;
        }

        button:hover { opacity: 0.85; transform: scale(1.02); }
        
        footer { 
            margin-top: 30px; 
            font-size: 14px; 
            color: #aaa; 
            line-height: 1.6; 
        }

        #preview-container {
            width: 600px; 
            border: 1px solid white;
            border-radius: 10px;
            overflow: hidden;
            background-color: #111;
        }

        .ideone-wrapper {
            background: white;
            padding: 10px;
            text-align: left;
            min-height: 400px;
        }
    </style>
</head>

<body>
    <div id="data">
        <div id="main-card">
            <div id="info-text">Loading... (Đang tải...)</div>
            <div id="buttons"></div>
        </div>
        
        <div id="preview-container">
            <div style="background: #333; padding: 8px 12px; border-bottom: 1px solid #444; text-align: center; font-size: 12px; color: #ccc; font-family: monospace; display: flex; align-items: center; justify-content: center; gap: 8px;">
                <span style="color: #27c93f;">●</span> Code Stuff (Ideone)
            </div>
            <div class="ideone-wrapper">
                <script src="https://ideone.com/e.js/tkEsSa" type="text/javascript"></script>
            </div>
        </div>
    </div>

    <footer>
        Nguyễn Thanh Phú - 0845939722 - msnp@outlook.com.vn
    </footer>
</body>

</html>
